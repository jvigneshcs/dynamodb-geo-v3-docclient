name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.2.0
  workflow_dispatch:  # Allows manual trigger

# Opt into Node.js 24 for GitHub Actions to resolve the Node 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build
      
      - name: Create package tarball
        run: |
          npm pack
          PKG_NAME=$(npm pack --dry-run 2>&1 | tail -1)
          echo "PACKAGE_FILE=$PKG_NAME" >> $GITHUB_ENV
      
      # Replaces both create-release@v1 and upload-release-asset@v1
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: ./${{ env.PACKAGE_FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
